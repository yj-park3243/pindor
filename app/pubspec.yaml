name: spots
description: 위치 기반 스포츠 매칭 플랫폼
publish_to: 'none'
version: 1.0.0+49

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # 라우팅
  go_router: ^13.0.0

  # HTTP
  dio: ^5.4.0

  # WebSocket
  socket_io_client: ^2.0.3+1

  # 지도
  flutter_naver_map: ^1.3.0

  # 푸시 알림
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.0

  # 소셜 로그인
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # 이미지
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1

  # 저장소
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # 로컬 DB
  drift: ^2.22.1
  drift_flutter: ^0.2.4

  # 유틸리티
  intl: ^0.19.0
  uuid: ^4.3.3
  logger: ^2.0.2+1
  connectivity_plus: ^5.0.2
  permission_handler: ^11.2.0
  geolocator: ^11.0.0

  # UI
  loading_animation_widget: ^1.3.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  fl_chart: ^0.67.0
  badges: ^3.1.2
  timeago: ^3.6.1
  url_launcher: ^6.2.4
  flutter_pickers: ^2.2.0
  adaptive_platform_ui: ^0.1.104
  geocoding: ^4.0.0
  material_dialogs: ^1.1.4
  pull_down_button: ^0.10.2
  material_symbols_icons: ^4.2928.1
  like_button: ^2.1.0
  bottom_picker: ^4.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  drift_dev: ^2.22.1
  riverpod_generator: ^2.3.9
  patrol: ^4.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

patrol:
  app_name: 핀돌
  android:
    package_name: kr.pins.spots
  ios:
    bundle_id: kr.pins
